name: "Create Image for ECR"

on:
    push:
      branches: ["ecr-setup"]

env:
  ECR_REPOSITORY: "profile-repo"
  AWS_REGION: "ap-southeast-2"
  ROLE_TO_ASSUME: "arn:aws:iam::405481637631:role/github-action-role"

permissions:
  id-token: write
  contents: read

jobs:
    S3BucketWrite:
      runs-on: ubuntu-latest
      steps:
        - name: Checkout code
          uses: actions/checkout@v5

        - name: Configure AWS Credentials
          uses: aws-actions/configure-aws-credentials@v6.1.0
          with:
            role-to-assume: ${{ env.ROLE_TO_ASSUME }}
            aws-region: ${{ env.AWS_REGION }}
        
        - name: Login to ECR
          id: login-ecr
          uses: aws-actions/amazon-ecr-login@v2
        

    